<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dashboard-container">
        
        <div class="sticky-top-section">
            <div class="sticky-top-content">
                
                <div id="header-loader" class="header-loader">
                    <div class="spinner"></div>
                    <h2>Loading Tasks...</h2>
                </div>

                <div id="header-content" class="header-content" style="display: none;">
                    <header class="header">
                        
                        <div class="header-status-row">
                            <div class="status-group">
                                <div id="tasks-status" class="last-updated" style="color: #E74C3C; font-weight: bold;"></div>
                            </div>
                        </div>

                        <div class="header-main-row">
                            <div class="header-left" id="main-title-group">
                                <div class="title-group">
                                    <h1 id="main-project-title" style="display: none;">Loading Project...</h1>
                                    <div class="date-progress-wrapper">
                                        <div class="range-label" id="project-date-range">Calculating dates...</div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="header-action-row">
                                <div class="action-buttons-group">
                                    <select id="project-filter" class="header-action-btn" data-tooltip="Filter by Project" style="display: none;">
                                        <option value="All">All Projects</option>
                                    </select>

                                    <select id="assignee-filter" class="header-action-btn" data-tooltip="Filter by Assignee">
                                        <option value="All">All Assignees</option>
                                        </select>

                                    <button id="view-toggle-btn" class="header-action-btn">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                                        <span id="view-toggle-text">Show Completed</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>
                </div>

            </div>
        </div>

        <div class="calendar-wrapper">
            <div id="tasks-container" class="tasks-container">
                </div>
            <div class="calendar-bottom-padding"></div>
        </div>
    </div>

    <div id="modal-overlay" class="modal-overlay hidden">
        <div id="add-modal" class="modal hidden">
            <div class="modal-header">
                <h2 id="add-modal-title">Add Task</h2>
                <button class="close-btn" onclick="closeModals()">✕</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="add-target-date">
                
                <div class="form-group">
                    <label>Task Name</label>
                    <input type="text" id="add-name" placeholder="Enter task details...">
                </div>

                <div class="form-group">
                    <label>Assignee</label>
                    <input type="text" id="add-assignee" placeholder="e.g., CGO, CGAO, CGS, PCC">
                </div>
            </div>
            <div class="modal-footer">
                <button class="save-btn" onclick="saveCustomTask()">Save Task</button>
            </div>
        </div>
    </div>
    
    <script src="tasks.js"></script>
</body>
</html>
