<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dashboard-container">
        
        <div class="sticky-top-section">
            <div class="sticky-top-content">
                
                <div id="header-loader" class="header-loader">
                    <div class="spinner"></div>
                    <h2>Loading Tasks...</h2>
                </div>

                <div id="header-content" class="header-content" style="display: none;">
                    <header class="header">
                        
                        <div class="header-status-row">
                            <div class="status-group">
                                <div id="tasks-status" class="last-updated" style="color: #E74C3C; font-weight: bold;"></div>
                            </div>
                        </div>

                        <div class="header-main-row">
                            <div class="header-left" id="main-title-group">
                                <div class="title-group">
                                    <h1 id="main-project-title" style="display: none;">Loading Project...</h1>
                                    <div class="date-progress-wrapper">
                                        <div class="range-label" id="project-date-range">Calculating dates...</div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="header-action-row">
                                <select id="project-filter" class="header-action-btn" data-tooltip="Filter by Project" style="display: none;">
                                    <option value="All">All Projects</option>
                                </select>

                                <div class="action-buttons-group">
                                    <button id="view-toggle-btn" class="header-action-btn">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                                        <span id="view-toggle-text">Hide Completed</span>
                                    </button>

                                    <button class="global-add-btn" id="add-task-btn" onclick="openAddModal()" data-tooltip="Add Custom Task">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>
                </div>

            </div>
        </div>

        <div class="calendar-wrapper">
            <div id="tasks-container" class="tasks-container">
                </div>
        </div>
    </div>

    <div id="modal-overlay" class="modal-overlay hidden">
        <div id="add-modal" class="modal hidden">
            <div class="modal-header">
                <h2>Add Custom Task</h2>
                <button class="close-btn" onclick="closeModals()">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Task Name</label>
                    <input type="text" id="add-name" placeholder="Enter task details...">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Weeks Prior to Start Date</label>
                        <input type="number" id="add-wks" value="0" placeholder="e.g., 4 or -1">
                        <span style="font-size: 0.7rem; color: var(--text-secondary); margin-top: 2px;">Use negative numbers for post-launch tasks.</span>
                    </div>
                </div>

                <div class="form-group">
                    <label>Assignee</label>
                    <input type="text" id="add-assignee" placeholder="e.g., PM, Dev, Client">
                </div>
            </div>
            <div class="modal-footer">
                <button class="save-btn" onclick="saveCustomTask()">Save Task</button>
            </div>
        </div>
    </div>
    
    <script src="tasks.js"></script>
</body>
</html>
