<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <div id="dropzone" class="dropzone">
            <div class="dropzone-content">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                <p id="drop-text">Drag & Drop .xlsx file here or click to browse</p>
                <input type="file" id="file-input" accept=".xlsx, .xls, .csv" hidden>
            </div>
        </div>

        <div class="controls">
            <button id="prev-week" class="btn">&larr; Prev Week</button>
            <h2 id="current-week-label">Week of ...</h2>
            <button id="next-week" class="btn">Next Week &rarr;</button>
        </div>

        <div class="calendar-wrapper">
            <div id="calendar-grid" class="calendar-grid">
                </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
