<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div class="dashboard-container">
        
        <header class="header">
            <div class="header-left">
                <div class="title-group">
                    <h1 id="project-title">Loading Project...</h1>
                    <h2 id="project-date-range">Waiting for data</h2>
                </div>
            </div>
            
            <div class="header-right">
                <div class="status-group">
                    <div id="status-indicator" class="status">Waiting for data</div>
                    <div id="last-updated" class="last-updated"></div>
                </div>
                <div class="upload-module" id="dropzone">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    <span>Upload New Data</span>
                    <input type="file" id="file-input" accept=".xlsx, .xls, .csv" hidden>
                </div>
            </div>
        </header>

        <div class="calendar-wrapper">
            <div class="grid-headers">
                <div class="day-label">Mon</div>
                <div class="day-label">Tue</div>
                <div class="day-label">Wed</div>
                <div class="day-label">Thu</div>
                <div class="day-label">Fri</div>
                <div class="day-label weekend">Sat</div>
            </div>
            <div id="calendar-grid" class="calendar-grid">
                </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
