<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div class="dashboard-container">
        
        <header class="header">
            <div class="header-left">
                <div class="title-group">
                    <h1 id="project-date-range">Loading timeline...</h1>
                </div>
            </div>
            
            <div class="header-right">
                <div class="status-group">
                    <div id="status-indicator" class="status">Waiting for data</div>
                    <div id="last-updated" class="last-updated"></div>
                </div>
                <div class="upload-module" id="dropzone">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    <span>Drag & Drop XLSX</span>
                    <input type="file" id="file-input" accept=".xlsx, .xls, .csv" hidden>
                </div>
            </div>
        </header>

        <div class="calendar-wrapper">
            <div class="grid-headers">
                <div class="day-label">Mon</div>
                <div class="day-label">Tue</div>
                <div class="day-label">Wed</div>
                <div class="day-label">Thu</div>
                <div class="day-label">Fri</div>
                <div class="day-label weekend">Sat</div>
            </div>
            <div id="calendar-grid" class="calendar-grid">
                </div>
        </div>
    </div>

    <div id="modal-overlay" class="modal-overlay hidden">
        
        <div id="add-modal" class="modal hidden">
            <div class="modal-header">
                <h2>Add Event</h2>
                <button class="close-btn" onclick="closeModals()">✕</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="add-date">
                <div class="form-group">
                    <label>Event Name</label>
                    <input type="text" id="add-name" placeholder="Enter event name...">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Invited</label>
                        <input type="number" id="add-invited" value="0" min="0">
                    </div>
                    <div class="form-group">
                        <label>Accepted</label>
                        <input type="number" id="add-accepted" value="0" min="0">
                    </div>
                </div>
                <button class="save-btn" onclick="saveNewEvent()">Save Event</button>
            </div>
        </div>

        <div id="edit-modal" class="modal hidden">
            <div class="modal-header">
                <h2 id="edit-title">Edit Event</h2>
                <button class="close-btn" onclick="closeModals()">✕</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-id">
                <div class="form-row">
                    <div class="form-group">
                        <label>Invited</label>
                        <input type="number" id="edit-invited" min="0">
                    </div>
                    <div class="form-group">
                        <label>Accepted</label>
                        <input type="number" id="edit-accepted" min="0">
                    </div>
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="edit-notes" rows="4" placeholder="Add custom notes here..."></textarea>
                </div>
                <button class="save-btn" onclick="saveEditedEvent()">Save Changes</button>
            </div>
        </div>

    </div>
    
    <script src="app.js"></script>
</body>
</html>
