<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div class="dashboard-container">
        
        <div class="sticky-top-section">
            <header class="header">
                <div class="header-left">
                    <div class="title-group">
                        <h1 id="project-date-range">Loading timeline...</h1>
                    </div>
                </div>
                
                <div class="header-right">
                    <div class="status-group">
                        <div id="status-indicator" class="status">Waiting for data</div>
                        <div id="last-updated" class="last-updated"></div>
                    </div>
                    
                    <div class="upload-module" id="dropzone">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                        <span>Upload XLSX</span>
                        <input type="file" id="file-input" accept=".xlsx, .xls, .csv" hidden>
                    </div>

                    <button class="global-add-btn" onclick="openAddModal()" title="Add Event">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                </div>
            </header>

            <div class="grid-headers"></div>
        </div>

        <div class="calendar-wrapper">
            <div id="calendar-grid" class="calendar-grid">
            </div>
        </div>
    </div>

    <div id="modal-overlay" class="modal-overlay hidden">
        
        <div id="add-modal" class="modal hidden">
            <div class="modal-header">
                <h2>Add Event</h2>
                <button class="close-btn" onclick="closeModals()">✕</button>
            </div>
            <div class="modal-body">
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Start Date</label>
                        <input type="date" id="add-start-date">
                    </div>
                    <div class="form-group">
                        <label>End Date</label>
                        <input type="date" id="add-end-date">
                    </div>
                </div>

                <div class="form-group">
                    <label>Event Name</label>
                    <input type="text" id="add-name" placeholder="Enter event name...">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Invited (Daily)</label>
                        <input type="number" id="add-invited" value="0" min="0">
                    </div>
                    <div class="form-group">
                        <label>Accepted (Daily)</label>
                        <input type="number" id="add-accepted" value="0" min="0">
                    </div>
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="add-notes" rows="2" placeholder="Add custom notes here..."></textarea>
                </div>
                <button class="save-btn" onclick="saveNewEvent()">Save Event</button>
            </div>
        </div>

        <div id="edit-modal" class="modal hidden">
            <div class="modal-header">
                <h2 id="edit-title">Edit Event</h2>
                <button class="close-btn" onclick="closeModals()">✕</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-old-name">
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Start Date</label>
                        <input type="date" id="edit-start-date">
                    </div>
                    <div class="form-group">
                        <label>End Date</label>
                        <input type="date" id="edit-end-date">
                    </div>
                </div>

                <div class="form-group">
                    <label>Daily Stats</label>
                    <div id="edit-daily-stats" class="edit-scroll-container">
                        </div>
                </div>

                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="edit-notes" rows="3" placeholder="Add custom notes here..."></textarea>
                </div>
                <button class="save-btn" onclick="saveEditedEvent()">Save Changes</button>
            </div>
        </div>

    </div>
    
    <script src="app.js"></script>
</body>
</html>
