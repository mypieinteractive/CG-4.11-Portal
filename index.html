<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div class="dashboard-container">
        
        <div class="sticky-top-section">
            <div class="sticky-top-content">
                
                <div id="header-loader" class="header-loader">
                    <div class="spinner"></div>
                    <h2>Loading...</h2>
                </div>

                <div id="header-content" class="header-content" style="display: none;">
                    <header class="header">
                        
                        <div class="header-status-row">
                            <div class="status-group">
                                <div id="last-updated" class="last-updated"></div>
                            </div>
                        </div>

                        <div class="header-main-row">
                            <div class="header-left" id="main-title-group">
                                <div class="title-group">
                                    <h1 id="main-project-title" style="display: none;">Loading Project...</h1>
                                    <div class="date-progress-wrapper">
                                        <div class="range-label" id="project-date-range">Calculating dates...</div>
                                        <div id="progress-container" class="progress-container" style="display: none;">
                                            <div class="progress-bar">
                                                <div class="progress-fill" id="progress-fill"></div>
                                                <div class="progress-marker" id="progress-marker"></div>
                                            </div>
                                            <div class="progress-text" id="progress-text">0 Days Remaining</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="header-action-row">
                                <select id="project-filter" class="header-action-btn" data-tooltip="Filter by Project" style="display: none;">
                                    <option value="All">All Projects</option>
                                </select>

                                <div class="mobile-wrap-group">
                                    <select id="event-type-filter" class="header-action-btn" data-tooltip="Filter by Event Type">
                                        <option value="All">All Types</option>
                                        <option value="Work Event">Work Events</option>
                                        <option value="Delivery">Deliveries</option>
                                        <option value="Inspection">Inspections</option>
                                        <option value="Other">Other</option>
                                    </select>

                                    <button id="view-toggle-btn" class="header-action-btn">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                                        <span>Agenda</span>
                                    </button>

                                    <button id="stats-toggle-btn" class="header-action-btn">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                                        <span>Volunteers</span>
                                    </button>

                                    <button id="collapse-btn" class="header-action-btn">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
                                        <span>Minimize</span>
                                    </button>
                                </div>

                                <div class="mobile-btn-row">
                                    <button class="upload-module" id="upload-btn" data-tooltip="Upload Events">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                                        <span>Upload XLSX</span>
                                        <input type="file" id="file-input" accept=".xlsx, .xls, .csv" hidden>
                                    </button>

                                    <button class="global-add-btn" onclick="openAddModal()" data-tooltip="Add Event">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    <div class="grid-headers"></div>
                </div>

            </div>
        </div>

        <div class="calendar-wrapper">
            <div id="calendar-grid" class="calendar-grid view-notes">
            </div>
        </div>
    </div>

    <div id="global-drag-overlay" class="global-drag-overlay hidden">
        <div class="drag-overlay-box">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            <h2>Drop the "Event Export" XLSX file from BA here to add or update events</h2>
        </div>
    </div>

    <div id="modal-overlay" class="modal-overlay hidden">
        
        <div id="add-modal" class="modal hidden">
            <div class="modal-header">
                <h2>Add Event</h2>
                <button class="close-btn" onclick="closeModals()">✕</button>
            </div>
            <div class="modal-body">
                
                <div class="form-group" id="add-project-group" style="display: none;">
                    <label>Target Project</label>
                    <select id="add-project"></select>
                </div>

                <div class="form-group">
                    <label>Event Type</label>
                    <select id="add-type">
                        <option value="Work Event" selected>Work Event</option>
                        <option value="Delivery">Delivery</option>
                        <option value="Inspection">Inspection</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label id="add-start-date-label">Start Date</label>
                        <input type="date" id="add-start-date">
                    </div>
                    <div class="form-group" id="add-end-date-group">
                        <label>End Date</label>
                        <input type="date" id="add-end-date">
                    </div>
                </div>

                <div class="form-group">
                    <label id="add-name-label">Event Name</label>
                    <input type="text" id="add-name" placeholder="Enter details...">
                </div>

                <div class="form-row" id="add-stats-wrapper">
                    <div class="form-group">
                        <label>Invited (Daily)</label>
                        <input type="number" id="add-invited" value="0" min="0">
                    </div>
                    <div class="form-group">
                        <label>Accepted (Daily)</label>
                        <input type="number" id="add-accepted" value="0" min="0">
                    </div>
                </div>

                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="add-notes" rows="2" placeholder="Add custom notes here..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="save-btn" onclick="saveNewEvent()">Save Event</button>
            </div>
        </div>

        <div id="edit-modal" class="modal hidden">
            <div class="modal-header">
                <h2 id="edit-title">Edit Event</h2>
                <button class="close-btn" onclick="closeModals()">✕</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-old-name">
                
                <div class="form-group" id="edit-name-group">
                    <label>Event Name</label>
                    <input type="text" id="edit-name">
                </div>
                
                <div class="form-group" id="edit-type-group">
                    <label>Event Type</label>
                    <select id="edit-type">
                        <option value="Work Event">Work Event</option>
                        <option value="Delivery">Delivery</option>
                        <option value="Inspection">Inspection</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label id="edit-start-date-label">Start Date</label>
                        <input type="date" id="edit-start-date">
                    </div>
                    <div class="form-group" id="edit-end-date-group">
                        <label>End Date</label>
                        <input type="date" id="edit-end-date">
                    </div>
                </div>

                <div id="edit-daily-stats" class="daily-stats-list">
                    </div>
            </div>
            <div class="modal-footer">
                <div id="edit-imported-note" class="imported-note" style="display: none;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    Imported from BA
                </div>
                <button id="delete-btn" class="delete-btn" onclick="deleteEvent()">Delete</button>
                <button class="save-btn" onclick="saveEditedEvent()">Save Changes</button>
            </div>
        </div>

        <div id="global-upload-modal" class="modal hidden">
            <div class="modal-header">
                <h2>Select Project for Upload</h2>
                <button class="close-btn" onclick="closeModals()">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Target Project</label>
                    <select id="upload-project-select"></select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="save-btn" onclick="confirmGlobalUpload()">Continue Upload</button>
            </div>
        </div>

    </div>
    
    <script src="app.js"></script>
</body>
</html>
